apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-service-account
  namespace: aws-claude-chatbot
  annotations:
    # Replace <AWS_ACCOUNT_ID> with your actual AWS account number.
    # This associates the IAM role created by Terraform with this pod's service account.
    eks.amazonaws.com/role-arn: arn:aws:iam::<AWS_ACCOUNT_ID>:role/aws-claude-chatbot-backend-irsa-role
